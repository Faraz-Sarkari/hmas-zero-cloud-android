<?xml version="1.0" encoding="UTF-8"?>
<svg width="1300" height="1100" viewBox="0 0 1300 1100"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">

  <defs>
    <!-- Glow filters -->
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-title" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="hub-grad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2e"/>
    </radialGradient>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#211a08"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#091a0f"/>
      <stop offset="100%" stop-color="#071209"/>
    </linearGradient>
    <linearGradient id="watchdog-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#110820"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffaa00" opacity="0.8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#39d353" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="1100" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1300" y2="100"/>
    <line x1="0" y1="200" x2="1300" y2="200"/>
    <line x1="0" y1="300" x2="1300" y2="300"/>
    <line x1="0" y1="400" x2="1300" y2="400"/>
    <line x1="0" y1="500" x2="1300" y2="500"/>
    <line x1="0" y1="600" x2="1300" y2="600"/>
    <line x1="0" y1="700" x2="1300" y2="700"/>
    <line x1="0" y1="800" x2="1300" y2="800"/>
    <line x1="0" y1="900" x2="1300" y2="900"/>
    <line x1="0" y1="1000" x2="1300" y2="1000"/>
    <line x1="130" y1="0" x2="130" y2="1100"/>
    <line x1="260" y1="0" x2="260" y2="1100"/>
    <line x1="390" y1="0" x2="390" y2="1100"/>
    <line x1="520" y1="0" x2="520" y2="1100"/>
    <line x1="650" y1="0" x2="650" y2="1100"/>
    <line x1="780" y1="0" x2="780" y2="1100"/>
    <line x1="910" y1="0" x2="910" y2="1100"/>
    <line x1="1040" y1="0" x2="1040" y2="1100"/>
    <line x1="1170" y1="0" x2="1170" y2="1100"/>
  </g>

  <!-- ===== HEADER ===== -->
  <text x="65" y="58" font-size="13" letter-spacing="3" fill="#3d7a52" font-weight="600">HMAS · SYSTEM ARCHITECTURE</text>

  <text x="65" y="100" font-size="38" font-weight="700" filter="url(#glow-title)">
    <tspan fill="#39d353">$</tspan>
    <tspan fill="#e6edf3"> ./hmas </tspan>
    <tspan fill="#58a6ff">--architecture</tspan>
  </text>
  <!-- blinking cursor -->
  <rect x="470" y="72" width="3" height="36" fill="#39d353" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="65" y="130" font-size="14" fill="#6e7681" letter-spacing="0.5">
    Heterogeneous Multi-Agent System — 6 agents · zero cloud · shared-state IPC · Android/Termux
  </text>

  <!-- Cost + status badges -->
  <rect x="950" y="60" width="155" height="28" rx="14" fill="#0a1f0e" stroke="#39d353" stroke-width="1.5"/>
  <text x="1027" y="79" font-size="12" font-weight="700" fill="#39d353" text-anchor="middle">✓ $0 INFRA COST</text>

  <rect x="1115" y="60" width="130" height="28" rx="14" fill="#0a1220" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="1180" y="79" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">6 AGENTS LIVE</text>

  <!-- ===== DEVICE BOUNDARY ===== -->
  <rect x="48" y="155" width="1204" height="870" rx="20" fill="#0b0f16" stroke="#1e2d3d" stroke-width="2"/>
  <!-- Device label -->
  <rect x="48" y="155" width="320" height="28" rx="8" fill="#1e2d3d"/>
  <text x="70" y="174" font-size="12" letter-spacing="2.5" fill="#58a6ff" font-weight="600">ANDROID · TERMUX RUNTIME</text>

  <!-- ===== WATCHDOG SUPERVISION BOUNDARY ===== -->
  <rect x="95" y="200" width="1110" height="720" rx="20"
        fill="none" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.35"/>
  <!-- Watchdog label top-right -->
  <text x="1170" y="222" font-size="11" fill="#c084fc" text-anchor="end" opacity="0.7" letter-spacing="1">WATCHDOG SUPERVISION BOUNDARY</text>

  <!-- ===== SPOKE LINES (drawn behind nodes) ===== -->
  <!-- Amber pipeline spokes -->
  <g stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Hub top to Data Extraction (top) -->
    <line x1="650" y1="490" x2="650" y2="320" stroke="#ffaa00" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
    <!-- Hub right to Predictive Analytics (upper right) -->
    <line x1="790" y1="530" x2="950" y2="380" stroke="#ffaa00" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
    <!-- Hub right to Decision Layer (lower right) -->
    <line x1="790" y1="590" x2="950" y2="690" stroke="#ffaa00" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
    <!-- Green resilience spokes -->
    <!-- Hub bottom to Reacquisition (bottom) -->
    <line x1="650" y1="650" x2="650" y2="790" stroke="#39d353" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
    <!-- Hub left to Inventory Listener (lower left) -->
    <line x1="510" y1="590" x2="350" y2="690" stroke="#39d353" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
    <!-- Hub left to Network Observability (upper left) -->
    <line x1="510" y1="530" x2="350" y2="380" stroke="#39d353" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  </g>

  <!-- ===== HUB: SHARED STATE FILES ===== -->
  <rect x="510" y="490" width="280" height="160" rx="16" fill="url(#hub-grad)" stroke="#58a6ff" stroke-width="2.5" filter="url(#glow-blue)"/>
  <!-- inner detail lines -->
  <line x1="530" y1="540" x2="770" y2="540" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="530" y1="560" x2="770" y2="560" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="530" y1="580" x2="770" y2="580" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Hub text -->
  <text x="650" y="522" font-size="8" fill="#3d6a9e" text-anchor="middle" letter-spacing="2">{ JSON }</text>
  <text x="650" y="548" font-size="19" font-weight="700" fill="#79c0ff" text-anchor="middle">SHARED STATE</text>
  <text x="650" y="570" font-size="13" fill="#79c0ff" text-anchor="middle">FILES</text>
  <text x="650" y="594" font-size="10.5" fill="#4d7ea8" text-anchor="middle" font-style="italic">no agent calls another directly</text>
  <text x="650" y="614" font-size="10" fill="#3d6080" text-anchor="middle">flat files · local disk · crash-safe</text>
  <text x="650" y="636" font-size="10" fill="#2d4f6b" text-anchor="middle">prices.json · forecast.json · decision.json</text>

  <!-- ===== PIPELINE AGENTS (amber) ===== -->

  <!-- Data Extraction Agent (top center) -->
  <rect x="495" y="210" width="310" height="110" rx="12" fill="url(#amber-grad)" stroke="#ffaa00" stroke-width="2" filter="url(#glow-amber)"/>
  <rect x="495" y="210" width="310" height="4" rx="12" fill="#ffaa00" opacity="0.6"/>
  <text x="510" y="235" font-size="9" fill="#ffaa00" letter-spacing="2" opacity="0.7">PIPELINE · AGENT 1</text>
  <text x="650" y="262" font-size="17" font-weight="700" fill="#ffd479" text-anchor="middle">Data Extraction Agent</text>
  <text x="650" y="284" font-size="11.5" fill="#b8924a" text-anchor="middle">syncs 9 retail platforms · every 4 hours</text>
  <text x="650" y="302" font-size="10.5" fill="#7a5e30" text-anchor="middle">distributed egress routing · rate-limit handling</text>

  <!-- Predictive Analytics Engine (upper right) -->
  <rect x="960" y="300" width="300" height="110" rx="12" fill="url(#amber-grad)" stroke="#ffaa00" stroke-width="2" filter="url(#glow-amber)"/>
  <rect x="960" y="300" width="300" height="4" rx="12" fill="#ffaa00" opacity="0.6"/>
  <text x="975" y="325" font-size="9" fill="#ffaa00" letter-spacing="2" opacity="0.7">PIPELINE · AGENT 2</text>
  <text x="1110" y="352" font-size="17" font-weight="700" fill="#ffd479" text-anchor="middle">Predictive Analytics</text>
  <text x="1110" y="374" font-size="17" font-weight="700" fill="#ffd479" text-anchor="middle">Engine</text>
  <text x="1110" y="396" font-size="10.5" fill="#7a5e30" text-anchor="middle">local linear regression · price baseline forecast</text>

  <!-- Decision Layer (lower right) -->
  <rect x="960" y="650" width="300" height="110" rx="12" fill="url(#amber-grad)" stroke="#ffaa00" stroke-width="2" filter="url(#glow-amber)"/>
  <rect x="960" y="650" width="300" height="4" rx="12" fill="#ffaa00" opacity="0.6"/>
  <text x="975" y="675" font-size="9" fill="#ffaa00" letter-spacing="2" opacity="0.7">PIPELINE · AGENT 3</text>
  <text x="1110" y="703" font-size="17" font-weight="700" fill="#ffd479" text-anchor="middle">Decision Layer</text>
  <text x="1110" y="727" font-size="13" fill="#b8924a" text-anchor="middle">BUY  ·  WAIT</text>
  <text x="1110" y="748" font-size="10.5" fill="#7a5e30" text-anchor="middle">synthesizes trend + forecast → signal</text>

  <!-- ===== RESILIENCE AGENTS (green) ===== -->

  <!-- Network Observability Agent (upper left) -->
  <rect x="40" y="300" width="300" height="110" rx="12" fill="url(#green-grad)" stroke="#39d353" stroke-width="2" filter="url(#glow-green)"/>
  <rect x="40" y="300" width="300" height="4" rx="12" fill="#39d353" opacity="0.5"/>
  <text x="55" y="325" font-size="9" fill="#39d353" letter-spacing="2" opacity="0.7">RESILIENCE · AGENT 4</text>
  <text x="190" y="352" font-size="17" font-weight="700" fill="#7ee2a8" text-anchor="middle">Network Observability</text>
  <text x="190" y="374" font-size="17" font-weight="700" fill="#7ee2a8" text-anchor="middle">Agent</text>
  <text x="190" y="396" font-size="10.5" fill="#2d6b40" text-anchor="middle">watches process health · triggers recovery</text>

  <!-- Inventory State Listener (lower left) -->
  <rect x="40" y="650" width="300" height="110" rx="12" fill="url(#green-grad)" stroke="#39d353" stroke-width="2" filter="url(#glow-green)"/>
  <rect x="40" y="650" width="300" height="4" rx="12" fill="#39d353" opacity="0.5"/>
  <text x="55" y="675" font-size="9" fill="#39d353" letter-spacing="2" opacity="0.7">RESILIENCE · AGENT 5</text>
  <text x="190" y="703" font-size="17" font-weight="700" fill="#7ee2a8" text-anchor="middle">Inventory State Listener</text>
  <text x="190" y="727" font-size="13" fill="#3a8c52" text-anchor="middle">high-frequency polling</text>
  <text x="190" y="748" font-size="10.5" fill="#2d6b40" text-anchor="middle">instant restock alerts · SKU-level tracking</text>

  <!-- Reacquisition Agent (bottom center) -->
  <rect x="495" y="800" width="310" height="110" rx="12" fill="url(#green-grad)" stroke="#39d353" stroke-width="2" filter="url(#glow-green)"/>
  <rect x="495" y="800" width="310" height="4" rx="12" fill="#39d353" opacity="0.5"/>
  <text x="510" y="825" font-size="9" fill="#39d353" letter-spacing="2" opacity="0.7">RESILIENCE · AGENT 6</text>
  <text x="650" y="852" font-size="17" font-weight="700" fill="#7ee2a8" text-anchor="middle">Reacquisition Agent</text>
  <text x="650" y="874" font-size="13" fill="#3a8c52" text-anchor="middle">event-triggered connection recovery</text>
  <text x="650" y="893" font-size="10.5" fill="#2d6b40" text-anchor="middle">restores dropped data connections autonomously</text>

  <!-- ===== WATCHDOG + LAUNCHER (bottom, outside supervision rect) ===== -->
  <!-- connecting line from supervision boundary down to watchdog -->
  <line x1="650" y1="920" x2="650" y2="952" stroke="#c084fc" stroke-width="2" opacity="0.7"/>
  <rect x="460" y="952" width="380" height="68" rx="14" fill="url(#watchdog-grad)" stroke="#c084fc" stroke-width="2" filter="url(#glow-purple)"/>
  <text x="650" y="979" font-size="15" font-weight="700" fill="#e2b8ff" text-anchor="middle">WATCHDOG + LAUNCHER</text>
  <text x="650" y="999" font-size="11" fill="#9a6fc2" text-anchor="middle">auto-restarts crashed agents · survives full device reboot</text>

  <!-- ===== LEGEND ===== -->
  <g font-size="12" fill="#8b949e">
    <!-- amber -->
    <rect x="68" y="1045" width="12" height="12" rx="2" fill="#ffaa00"/>
    <text x="88" y="1056">Intelligence pipeline</text>
    <!-- green -->
    <rect x="260" y="1045" width="12" height="12" rx="2" fill="#39d353"/>
    <text x="280" y="1056">Resilience &amp; ops</text>
    <!-- blue -->
    <rect x="430" y="1045" width="12" height="12" rx="2" fill="#58a6ff"/>
    <text x="450" y="1056">Shared state (IPC)</text>
    <!-- purple -->
    <rect x="600" y="1045" width="12" height="12" rx="2" fill="#c084fc"/>
    <text x="620" y="1056">Process supervision</text>
    <!-- dashed line -->
    <line x1="795" y1="1051" x2="835" y2="1051" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="843" y="1056">Read / write (shared state)</text>
  </g>

  <!-- Footer -->
  <text x="650" y="1085" font-size="11" fill="#3d4f5e" text-anchor="middle">github.com/faraz-sarkari/hmas-zero-cloud-android</text>

</svg>
